name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download and verify modules
        run: |
          set -euo pipefail
          go mod download
          go mod verify

      - name: Build archive and checksum
        run: |
          set -euo pipefail
          mkdir -p dist

          binary="cubicleq-${{ matrix.goos }}-${{ matrix.goarch }}"
          archive="${binary}.tar.gz"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w" -o "dist/${binary}" ./cmd/cubicleq

          tar -C dist -czf "dist/${archive}" "${binary}"
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
